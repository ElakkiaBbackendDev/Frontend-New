<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <style>
        body {
            font-family: Arial;
        }

        .container {
            width: 300px;
            margin: auto;
            margin-top: 50px;
        }

        .input-container {
            position: relative;
            width: 100%;
        }

        .input-container input {
            width: 100%;
            padding: 10px;
            padding-right: 40px;
            margin-bottom: 10px;
        }

        .eye {
            position: absolute;
            right: 10px;
            top: 35%;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Reset Password</h2>

    <input type="text" id="userDisplay" readonly><br><br>

    <div class="input-container">
        <input type="password" id="newPassword" placeholder="New Password">
        <span class="eye" onclick="togglePassword('newPassword')">👁️</span>
    </div>

    <div class="input-container">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <span class="eye" onclick="togglePassword('confirmPassword')">👁️</span>
    </div>

    <p id="error" style="color:red;"></p>
    <p id="success" style="color:green;"></p>

    <button onclick="resetPassword()">Reset Password</button>

</div>

<script>

let user;

window.onload = function () {
    user = localStorage.getItem("resetUser");

    if (user) {
        document.getElementById("userDisplay").value = user;
    }
};

// Toggle password
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

// Password validation
function validatePassword(password) {

    let errors = [];

    if (!/.{8,}/.test(password)) {
        errors.push("Minimum 8 characters required");
    }
    if (!/[A-Z]/.test(password)) {
        errors.push("At least one uppercase letter required");
    }
    if (!/[a-z]/.test(password)) {
        errors.push("At least one lowercase letter required");
    }
    if (!/[0-9]/.test(password)) {
        errors.push("At least one number required");
    }
    if (!/[!@#$%^&*(),.?\":{}|<>]/.test(password)) {
        errors.push("At least one special character required");
    }

    return errors;
}
function resetPassword() {

    const error = document.getElementById("error");
    const success = document.getElementById("success");

    error.innerText = "";
    success.innerText = "";

    const newPassword = document.getElementById("newPassword").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();

    if (!user || !newPassword || !confirmPassword) {
        error.innerText = "All fields are required";
        return;
    }

    if (newPassword !== confirmPassword) {
        error.innerText = "Passwords do not match";
        return;
    }

    // Password validation
    const passwordErrors = validatePassword(newPassword);

    if (passwordErrors.length > 0) {
        error.innerHTML = passwordErrors.join("<br>");
        return;
    }
    
    try {

        const storedPassword = localStorage.getItem("userPassword");

        // Password history
        let passwordHistory = JSON.parse(localStorage.getItem("passwordHistory")) || [];

        let lastPasswords = [storedPassword, ...passwordHistory];

        // Prevent reuse
        if (lastPasswords.includes(newPassword)) {
            error.innerText = "Cannot use last 3 passwords";
            return;
        }

        // Update history
        passwordHistory.unshift(storedPassword);
        passwordHistory = passwordHistory.slice(0, 3);

        localStorage.setItem("passwordHistory", JSON.stringify(passwordHistory));

        // Update password
        localStorage.setItem("userPassword", newPassword);

        success.innerText = "Password reset successfully! Redirecting...";

        setTimeout(() => {
            window.location.href = "login.html";
        }, 5000);

    } catch (err) {
        console.error(err);
        error.innerText = "Something went wrong";
    }
}

</script>

</body>
</html>
