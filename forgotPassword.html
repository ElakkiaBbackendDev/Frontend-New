<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 80px;
}
input {
    width: 260px;
    padding: 10px;
}
.error {
    color: red;
}
.list {
    margin-top: 10px;
    color: green;
    font-size: 14px;
}
</style>
</head>

<body>

<h2>Forgot Password</h2>

<form autocomplete="off">
    <input type="text" id="userInput">
</form>

<p id="error" class="error"></p>
<p id="altList" class="list"></p>

<button onclick="forgot()">Continue</button>
<br><br>

Back to 
<a href="login.html" style="color:blue; text-decoration:none; font-weight:bold;">
    Login
</a>
<script>

// =========================
// INIT ON LOAD
// =========================
window.onload = function(){

    const input = document.getElementById("userInput");
    const resetUser = localStorage.getItem("resetUser");

    const fromOtpFlow = sessionStorage.getItem("fromOtp") === "true";

    if(!fromOtpFlow){
        localStorage.setItem("changeMode", "false");
        localStorage.removeItem("resetUser");
    }

    let isChange = localStorage.getItem("changeMode") === "true";

    input.placeholder = "Enter Email or Mobile";
    input.disabled = false;

    if(isChange && resetUser){
        input.placeholder = "Enter Alternate Email or Mobile";

        input.value = resetUser;
        input.disabled = true;

        setTimeout(() => {
            input.value = "";
            input.disabled = false;
            input.focus();
        }, 500);
    }

    sessionStorage.removeItem("fromOtp");
};

function forgot(){

    const inputEl = document.getElementById("userInput");
    const inputVal = inputEl.value.trim().toLowerCase();

    const error = document.getElementById("error");
    const altListUI = document.getElementById("altList");

    error.innerText = "";
    altListUI.innerText = "";

    if(!inputVal){
        error.innerText = "Email or Mobile required";
        return;
    }

    const isEmail = /^[a-zA-Z0-9._%+-]+@(gmail|outlook|yahoo|thestackly)\.(com|in)$/.test(inputVal);
    const isMobile = /^[0-9]{10}$/.test(inputVal);

    if(!isEmail && !isMobile){
        error.innerText = "Enter valid Email or Mobile";
        return;
    }

    const storedEmail = (localStorage.getItem("userEmail") || "").toLowerCase();
    const storedMobile = (localStorage.getItem("userMobile") || "").toLowerCase();

    let altData = JSON.parse(localStorage.getItem("alternateContacts")) || {};
    let primaryUser = localStorage.getItem("resetUser");

    let isChange = localStorage.getItem("changeMode") === "true";

    let userList = altData[primaryUser] || [];
    userList = userList.map(u => u.toLowerCase());

    // CHANGE MODE
    if(isChange){

        // Only primary can add alternates
        if(primaryUser !== storedEmail && primaryUser !== storedMobile){
            error.innerText = "Only primary user can add alternates";

            setTimeout(() => {
                localStorage.setItem("changeMode", "false");
                window.location.href = "forgotPassword.html";
            }, 15000);

            return;
        }

        // cannot use primary again
        if(inputVal === storedEmail || inputVal === storedMobile){
            error.innerText = "Cannot use primary credentials... Redirecting..";

            setTimeout(() => {
                localStorage.setItem("changeMode", "false");
                window.location.href = "forgotPassword.html";
            }, 15000);

            return;
        }

        // duplicate for same user
        if(userList.includes(inputVal)){
            error.innerText = "Already added... Redirecting...";

            setTimeout(() => {
                localStorage.setItem("changeMode", "false");
                window.location.href = "forgotPassword.html";
            }, 15000);

            return;
        }

        // limit check
        if(userList.length >= 2){
            error.innerText = "Only 2 alternates allowed";
            altListUI.innerText = "Existing: " + userList.join(", ");

            setTimeout(() => {
                localStorage.setItem("changeMode", "false");
                window.location.href = "forgotPassword.html";
            }, 15000);

            return;
        }

        // prevent global duplicate
        let allAltValues = [];
        for (let key in altData) {
            allAltValues = allAltValues.concat(altData[key]);
        }

        if (allAltValues.includes(inputVal)) {
            error.innerText = "Already used as alternate";
            return;
        }

        // save alternate
        userList.push(inputVal);
        altData[primaryUser] = userList;

        localStorage.setItem("alternateContacts", JSON.stringify(altData));

        altListUI.innerText = "Alternate '" + inputVal + "' added successfully";

        localStorage.setItem("changeMode", "false");

        inputEl.value = "";
        inputEl.placeholder = "Enter Email or Mobile";

        return;
    }

    // NORMAL MODE
    else {

        let allAlternates = [];
        Object.values(altData).forEach(arr => {
            arr.forEach(a => allAlternates.push(a.toLowerCase()));
        });

        if(
            inputVal !== storedEmail &&
            inputVal !== storedMobile &&
            !allAlternates.includes(inputVal)
        ){
            error.innerText = "Email or Mobile not registered";
            return;
        }

        localStorage.setItem("resetUser", inputVal);
    }

    // =========================
    // OTP GENERATION
    // =========================
    const otp = Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem("resetOtp", otp);

    setTimeout(() => {
        alert("Your OTP  : " + otp + "  is sent to " + inputVal + " successfully.. ");
    }, 1000);

    // =========================
    // REDIRECT
    // =========================
    setTimeout(() => {
        if(isEmail){
            window.location.href = "verifyOtpByEmail.html";
        } else {
            window.location.href = "verifyOtpByMobile.html";
        }
    }, 2000);
}

</script>

</body>
</html>
