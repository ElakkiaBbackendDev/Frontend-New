<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>
body {
    font-family: Arial;
}

/* Input */
input {
    width: 220px;
    padding: 10px;
    margin-bottom: 5px;
}

/* Error */
.error {
    color: red;
    font-size: 13px;
    margin-bottom: 10px;
}

/* Info text */
.info {
    color: green;
    font-size: 13px;
    margin-bottom: 10px;
}

/* Password container */
.password-container {
    position: relative;
    width: 220px;
}

.password-container input {
    width: 100%;
    padding-right: 35px;
}

.password-container span {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
}

/* Button */
button {
    padding: 10px 20px;
    cursor: pointer;
}
</style>

</head>

<body>

<h2>Login</h2>

<!-- Email / Mobile -->
<input type="text" id="loginemailormobile" placeholder="Enter Email or Mobile" oninput="detectUserType()" autocomplete="off">
<div id="userTypeMsg" class="info"></div>
<div id="emailMobileError" class="error"></div>

<!-- Password -->
<div class="password-container">
    <input type="password" id="loginpassword" placeholder="Enter Password" autocomplete="new-password">
    <span onclick="togglePassword()">👁️</span>
</div>
<div id="passwordError" class="error"></div>

<br>

<button onclick="login()">Login</button>

<br><br>

<a href="forgotPassword.html">Forgot Password?</a>

<p>Don't have an account? <a href="index.html">Sign up</a></p>

<script>

// ================= VALIDATION =================
function isEmail(input) {
    return /^[a-zA-Z0-9._%+-]+@(gmail|outlook|yahoo|thestackly)\.(com|in)$/.test(input);
}

function isMobile(input) {
    return /^[0-9]{10}$/.test(input);
}

// ================= DETECT USER TYPE =================
function detectUserType() {

    const input = document.getElementById("loginemailormobile").value.trim().toLowerCase();
    const msg = document.getElementById("userTypeMsg");

    msg.innerText = "";

    if (!input) return;

    const storedEmail = (localStorage.getItem("userEmail") || "").toLowerCase();
    const storedMobile = (localStorage.getItem("userMobile") || "").toLowerCase();

    let altData = JSON.parse(localStorage.getItem("alternateContacts")) || {};

    // Primary check
    if (input === storedEmail || input === storedMobile) {
        msg.innerText = "Primary account";
        return;
    }

    // Alternate check
    let allAlternates = [];
    Object.values(altData).forEach(arr => {
        arr.forEach(a => allAlternates.push(a.toLowerCase()));
    });

    if (allAlternates.includes(input)) {
        msg.innerText = "Alternate account";
        return;
    }
}

// ================= TOGGLE PASSWORD =================
function togglePassword() {
    const field = document.getElementById("loginpassword");
    const eye = document.querySelector(".password-container span");

    if (field.type === "password") {
        field.type = "text";
        eye.innerText = "🙈";
    } else {
        field.type = "password";
        eye.innerText = "👁️";
    }
}

// ================= LOGIN =================
function login() {

    const emailOrMobile = document.getElementById("loginemailormobile").value.trim().toLowerCase();
    const password = document.getElementById("loginpassword").value;

    const emailError = document.getElementById("emailMobileError");
    const passError = document.getElementById("passwordError");

    emailError.innerText = "";
    passError.innerText = "";

    if (!emailOrMobile) {
        emailError.innerText = "Email or Mobile is required";
        return;
    }

    if (!password) {
        passError.innerText = "Password is required";
        return;
    }

    if (!isEmail(emailOrMobile) && !isMobile(emailOrMobile)) {
        emailError.innerText = "Enter valid Email or Mobile";
        return;
    }

    const storedEmail = (localStorage.getItem("userEmail") || "").toLowerCase();
    const storedMobile = (localStorage.getItem("userMobile") || "").toLowerCase();
    const storedPassword = localStorage.getItem("userPassword");

    let altData = JSON.parse(localStorage.getItem("alternateContacts")) || {};

    let isValidUser = false;

    if (emailOrMobile === storedEmail || emailOrMobile === storedMobile) {
        isValidUser = true;
    }

    let allAlternates = [];
    Object.values(altData).forEach(arr => {
        arr.forEach(a => allAlternates.push(a.toLowerCase()));
    });

    if (allAlternates.includes(emailOrMobile)) {
        isValidUser = true;
    }

    if (!isValidUser) {
        emailError.innerText = "User not registered";
        return;
    }

    if (password !== storedPassword) {
        passError.innerText = "Incorrect password";
        return;
    }

    alert("Login successful!");
    window.location.href = "home.html";
}

</script>

</body>
</html>
